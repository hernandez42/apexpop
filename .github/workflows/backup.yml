name: SuperClaw Backup

on:
  push:
    branches: [ master ]
  # 定时任务已禁用 2026-06-21

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    - name: Validate integrity
      run: |
        python3 -c "
        import json, os
        if os.path.exists('memory/gene_db.json') or os.path.exists('memory/shared-state.json'):
            print('State files present')
        import ast
        ok = 0
        for f in os.listdir('core-dna'):
            if f.endswith('.py'):
                try:
                    ast.parse(open(f'core-dna/{f}').read())
                    ok += 1
                except: pass
        print(f'Valid modules: {ok}')
        print('Backup integrity: OK')
        "
    - name: Snapshot
      uses: actions/upload-artifact@v4
      with:
        name: superclaw-snapshot-${{ github.run_id }}
        path: |
          core-dna/
          memory/
          *.md
        retention-days: 30
