name: Mimetic Evolution

on:
  push:
    branches: [ master ]
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  evolve:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Install deps
      run: pip install requests
    
    - name: Run Evolution Cycle
      env:
        SCNET_KEY: ${{ secrets.SCNET_KEY }}
        GPT55_KEY: ${{ secrets.GPT55_KEY }}
      run: |
        python3 -c "
import json, os, time, urllib.request, hashlib

# Load shared state
state_path = 'memory/shared-state.json'
if not os.path.exists(state_path):
    state_path = '../nanobot-state.json'

state = {}
if os.path.exists(state_path):
    with open(state_path) as f:
        state = json.load(f)

phi = state.get('_asi.json', {}).get('phi', 0)
genes = state.get('gene_db.json', [])
if not isinstance(genes, list): genes = []
ldrs = state.get('_asi.json', {}).get('ldrs', 0)

print(f'MIMETIC GH: phi={phi:.4f} ldrs={ldrs} genes={len(genes)}')

# Run one evolution using GPT-5.5
key = os.environ.get('GPT55_KEY', os.environ.get('SCNET_KEY', ''))
url = 'https://5yuantoken.org/v1/chat/completions'
model = 'gpt-5.5'

if key:
    # Generate one evolution insight
    prompt = f'System state: phi={phi:.4f}, {len(genes)} genes, {ldrs} cycles. What ONE improvement should the system make? Reply in 1 sentence.'
    data = json.dumps({'model': model, 'messages': [{'role': 'user', 'content': prompt}], 'max_tokens': 128}).encode()
    req = urllib.request.Request(url, data=data, headers={'Authorization': f'Bearer {key}', 'Content-Type': 'application/json'})
    try:
        with urllib.request.urlopen(req, timeout=30) as resp:
            result = json.loads(resp.read())
            insight = result['choices'][0]['message']['content']
            print(f'INSIGHT: {insight[:200]}')
            
            # Save insight as evolved state update
            evo_record = {
                'ts': time.time(),
                'node': 'github_actions',
                'phi': phi,
                'insight': insight[:200],
                'genes_count': len(genes),
                'hash': hashlib.sha256(insight.encode()).hexdigest()[:12]
            }
            
            os.makedirs('memory', exist_ok=True)
            evo_path = 'memory/gh-evolution.json'
            history = []
            if os.path.exists(evo_path):
                with open(evo_path) as f:
                    history = json.load(f)
            if not isinstance(history, list): history = []
            history.append(evo_record)
            history = history[-100:]
            with open(evo_path, 'w') as f:
                json.dump(history, f, indent=2)
            print(f'Evo record saved: {evo_record["hash"]}')
    except Exception as e:
        print(f'LLM call failed: {e}')
else:
    print('No API key configured - add SCNET_KEY and GPT55_KEY to GitHub Secrets')

print('Evolution cycle complete')
        "
    
    - name: Commit evolution results
      run: |
        git config user.name 'PHI_APEX_MIMETIC'
        git config user.email 'mimetic@phi-apex.ai'
        git add memory/gh-evolution.json memory/shared-state.json 2>/dev/null || true
        git diff --cached --quiet || (git commit -m "evolve: GitHub Actions cycle $(date +%Y%m%d-%H%M)" && git push)
